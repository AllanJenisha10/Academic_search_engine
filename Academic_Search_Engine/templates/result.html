<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<title>Results</title>

</head>

<body>

<div class="results-container">

<h2>
Results for "{{query}}"
</h2>

{% for r in results %}

<div class="card">

<h3>Rank {{loop.index}}</h3>

<p><b>Term Frequency :</b> {{r.tf}}</p>
<p><b>Inverse Document Frequency :</b> {{r.idf}}</p>
<p><b>TF-IDF Score :</b> {{r.tfidf}}</p>
<p><b>Cosine Similarity :</b> {{r.score}}</p>

<a href="{{r.url}}" target="_blank">
View Wikipedia Article
</a>

</div>

{% endfor %}

</div>

</body>
</html>
